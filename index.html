<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>

     <!-- daisy UI -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- font CDN -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

      <style>
        .font-geist{
            font-family: "Geist", sans-serif;
        }
      </style>
</head>
<body>
    <section class=" bg-slate-50 m-10 md:m-40 shadow-sm">
        <div class="flex flex-col items-center mx-auto pt-20">
            <img src="assets/github-logo.png" alt="">
            <h1 class="text-2xl font-bold pt-5">GitHub Issues Tracker</h1>
            <p class="text-[#64748B] pb-4">Sign in to manage your issues</p>
        </div>

    <div class="flex justify-center px-4 md:mx-auto pb-20">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
            <label class="label font-medium text-[#1F2937]">Username</label>
            <input id="input-name" type="text" maxlength="5" class="input" placeholder="Enter Username" />
            <p class="text-[#4A00FF]">Default: admin</p>

            <label class="label font-medium text-[#1F2937]">Password</label>
            <input id="input-pin" type="password" maxlength="8" class="input" placeholder="Enter Password" />
            <p class="text-[#4A00FF]">Default:    admin123</p>

            <button onclick="loginBtn()" class="btn btn-primary mt-4">Login</button>
        </fieldset>
    </div>


<script src="script.js/login.js"></script>
    </section>
</body>
</html>
