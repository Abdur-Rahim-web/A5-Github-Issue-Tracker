<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>

     <!-- daisy UI -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

     <!-- font CDN -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

     <!-- font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

      <style>
        .font-geist{
            font-family: "Geist", sans-serif;
        }
      </style>
</head>
<body class="bg-[#ECE4FF]">
    <!-- nav -->
    <div class="flex justify-between navbar bg-base-100 shadow-sm">
    <div class="flex">
        <img class="w-[50px]" src="assets/github-logo.png" alt="">
        <h1 class="text-2xl font-bold pt-2.5">GitHub Issues Tracker</h1>
    </div>

    <div>
        <div class="flex gap-2">
            <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
            <button class="btn btn-primary">Search</button>
        </div>
    </div>
    </div>

    <!-- toggle-button -->
    <section class=" bg-white p-4 m-4 md:mx-20 shadow-sm rounded-sm">
        <button id="all-btn" onclick="showAllIssues(); toggleButton('all-btn')" class="btn btn-primary mr-2 md:mr-1">All</button>
        <button id="open-btn" onclick="showOpenIssues(); toggleButton('open-btn')" class="btn mr-2 md:mr-1">Open</button>
        <button id="closed-btn" onclick="showClosedIssues(); toggleButton('closed-btn')" class="btn">Closed</button>
    </section>

    <!-- issue-container -->
    <section class=" bg-[#F8FAFC] p-4 m-4 md:mx-20 shadow-sm rounded-sm">
        <div class="flex justify-between">
            <div class="flex gap-2 items-center">
                <img class="w-10 h-10 bg-[#ECE4FF] rounded-full p-2" src="/assets/Aperture.png" alt="">
                <div>
                    <h3 class="text-2xl font-bold"><span id="total-issue">0</span> Issues</h3>
                    <p>Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex items-center gap-2">
                <img src="assets/green-circle.png" alt="">
                <p>Open</p>
                <img src="assets/purple-circle.png" alt="">
                <p>Closed</p>
            </div>
        </div>

        <hr class="text-[#9d7fe3] mt-4 shadow-sm">

        <!-- loadingSpinner -->
         <div id="loadingSpinner" class="flex hidden justify-center items-center mt-10">
            <span class="loading loading-dots loading-xl"></span>
         </div>

        <!-- all-issue -->
        <div id="allIssue-container" class="grid grid-cols-1 md:grid-cols-4 gap-4 py-4">
            
        </div>
    </section>

    <!-- model -->
    <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="modal-container" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box space-y-4">
    <h3 id="modal-title" class="text-3xl font-bold">Fix broken image uploads</h3>
    <div class="flex justify-start gap-2 items-center">
        <p id="modal-status" class="bg-green-500 rounded-full p-1 text-[12px]">Opened</p>
        <img class="h-1 w-1" src="assets/dot.png" alt="">
        <p class="text-[14px]"><span id="modal-status1">Opened</span> by <span id="modal-author">Fahim Ahmed</span></p>
        <img class="h-1 w-1" src="assets/dot.png" alt="">
        <p id="modal-updatedAt" class="text-[14px]">22/02/2026</p>
    </div>

    <div class="flex gap-2 items-center">
        <button class="btn btn-soft btn-secondary rounded-full text-[12px]"><i class="fa-solid fa-bug"></i> Bug</button>
        <button class="btn btn-soft btn-warning rounded-full text-[12px]"><img class="w-4 h-4" src="assets/help.png" alt="">help wanted</button>
    </div>

    <p id="modal-description">The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.</p>

    <div  class="flex justify-evenly items-center mx-10 p-2 bg-slate-100 rounded-sm">
        <div>
            <p>Assignee:</p>
            <h2 id="modal-assignee" class="font-bold text-black">Fahim Ahmed</h2>
        </div>
        <div>
            <p>Priority:</p>
            <button id="modal-priority" class="btn btn-secondary rounded-full text-[12px]">High</button>
        </div>
    </div>

      <form class="flex justify-end" method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>



    <script src="script.js/home.js"></script>
</body>
</html>
